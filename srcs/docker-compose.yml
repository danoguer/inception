services:
  mariadb:
    container_name: mariadb
    image: mariadb:oldstable
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
    env_file:
      - .env
    restart: always

  wordpress:
    container_name: wordpress
    image: wordpress:6-php8.2-fpm
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    env_file:
      - .env
    depends_on:
      - mariadb
    restart: always

  nginx:
    container_name: nginx
    image: nginx:1.24
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    volumes:
      - wordpress_data:/var/www/html
    ports:
      - "443:443"
    networks:
      - inception
    env_file:
      - .env
    depends_on:
      - wordpress
    restart: always

  redis:
    container_name: redis
    image: redis:42
    build:
      context: ./requirements/bonus/redis
      dockerfile: Dockerfile
    networks:
      - inception
    restart: always

  adminer:
    container_name: adminer
    image: adminer:42
    build:
      context: ./requirements/bonus/adminer
      dockerfile: Dockerfile
    networks:
      - inception
    restart: always

  static:
    container_name: static
    image: static:42
    build:
      context: ./requirements/bonus/static
      dockerfile: Dockerfile
    networks:
      - inception
    restart: always
  
  ftp:
    container_name: ftp
    image: ftp:42
    build:
      context: ./requirements/bonus/ftp
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    volumes:
      - wordpress_data:/var/www/html # Sharing the same heart as WordPress
    networks:
      - inception
    restart: always
  
  cadvisor:
    container_name: cadvisor
    image: cadvisor:42
    build:
      context: ./requirements/bonus/cadvisor
      dockerfile: Dockerfile
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - inception
    restart: always

networks:
  inception:
    driver: bridge

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/danoguer/data/mariadb

  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/danoguer/data/wordpress