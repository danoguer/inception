[www]
; The Linux user and group that will run the web processes
user = www-data
group = www-data
; CRITICAL: Listen on port 9000 
; (This is where NGINX will send all PHP requests across the Docker network)
listen = 0.0.0.0:9000
; Socket permissions
listen.owner = www-data
listen.group = www-data
; Process management configuration (Required to prevent crashes under load)
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
; THE LIFESAVER LINE:
; By default, PHP wipes all environment variables for "security".
; If we don't set this to "no", WordPress will not be able to read your .env file
; and will completely fail to connect to the MariaDB database.
clear_env = no