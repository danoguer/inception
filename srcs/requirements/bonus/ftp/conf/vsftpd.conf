# Listen on IPv4 (REQUIRED for Docker)
listen=YES
listen_ipv6=NO
# DO NOT run in the background
background=NO
# Standard User Settings
anonymous_enable=NO
local_enable=YES
write_enable=YES
local_root=/var/www/html
chroot_local_user=YES
allow_writeable_chroot=YES
# Security / Docker Hacks
secure_chroot_dir=/var/run/vsftpd/empty
seccomp_sandbox=NO
# Passive Mode (For your host connection)
pasv_enable=YES
pasv_min_port=21100
pasv_max_port=21110
pasv_address=127.0.0.1